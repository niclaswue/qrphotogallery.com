<!DOCTYPE html>
<html lang="{{.Lang}}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="theme-color" content="#13223A">
    <title>{{block "title" .}}{{T "landing.title"}}{{end}}</title>
    <meta name="description" content='{{block "description" .}}{{T "landing.meta_description"}}{{end}}'>
    <meta name="robots" content='{{block "robots" .}}index, follow{{end}}'>
    <link rel="canonical" href="{{.CanonicalURL}}">
    {{range .HreflangLinks}}<link rel="alternate" hreflang="{{.Lang}}" href="{{.URL}}">
    {{end}}<link rel="alternate" hreflang="x-default" href="{{.DefaultURL}}">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content='{{T "site.name"}}'>
    <meta property="og:title" content='{{template "title" .}}'>
    <meta property="og:description" content='{{template "description" .}}'>
    <meta property="og:locale" content='{{.LangLocale}}'>
    <meta property="og:url" content='{{.CanonicalURL}}'>
    <meta property="og:image" content='{{.BaseURL}}/static/img/og-default.jpg'>
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content='{{T "site.og_image_alt"}}'>
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content='{{template "title" .}}'>
    <meta name="twitter:description" content='{{template "description" .}}'>
    <meta name="twitter:image" content='{{.BaseURL}}/static/img/og-default.jpg'>
    <meta name="twitter:image:alt" content='{{T "site.og_image_alt"}}'>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="preconnect" href="https://eu-assets.i.posthog.com" crossorigin>
    <link rel="preconnect" href="https://eu.i.posthog.com" crossorigin>
    <link rel="preload" href="/static/fonts/jost-latin.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/static/fonts/cormorant-latin.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/static/fonts/cormorant-italic-latin.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="/static/css/main.css">
    {{block "head" .}}{{end}}
    <meta name="x-build-time" content="{{.BuildTime}}">
    <meta name="x-build-commit" content="{{.BuildCommit}}">
    <script>console.log("{{.AppName}} build", {time: {{.BuildTime}}, commit: {{.BuildCommit}}});</script>
    {{with .PostHog}}
    <script>
        window.__appPosthog = {
            key: {{.Key}},
            host: {{.Host}},
            userId: {{.UserID}},
            userEmail: {{.UserEmail}},
            userTier: {{.UserTier}}
        };
    </script>
    {{end}}
    <script>
        window.__cookieConsent = {
            label: {{T "cookie.label"}},
            title: {{T "cookie.title"}},
            body: {{T "cookie.body"}},
            privacy: {{T "cookie.privacy"}},
            privacyURL: {{.LangPrefix}} + "/legal#privacy",
            decline: {{T "cookie.decline"}},
            accept: {{T "cookie.accept"}}
        };
    </script>
    <script defer src="/static/js/cookie-consent.js"></script>
    <script defer src="/static/js/htmx.min.js"></script>
    <script defer src="/static/js/lang-switcher.js"></script>
</head>

<body class='{{block "bodyclass" .}}{{end}}'>
    {{block "content" .}}{{end}}
</body>

</html>
