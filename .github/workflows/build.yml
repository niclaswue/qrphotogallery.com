name: build-and-push

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # Bootstraps a superuser on server boot and lets the Playwright suite
    # promote test users to paid tiers via the PocketBase admin API.
    env:
      PB_SUPERUSER_EMAIL: test@test.com
      PB_SUPERUSER_PASSWORD: testpassword123
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Go unit tests
        run: go test ./...

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install Playwright
        run: cd tests && npm install && npx playwright install chromium

      - name: Build app
        run: go build -o app ./cmd/app

      - name: Start server
        run: |
          ./app serve &
          sleep 5

      - name: Run Playwright tests
        run: cd tests && npm test

      - name: Stop server
        run: pkill -f "./app serve" || true

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build stamps
        id: stamps
        run: |
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "build_commit=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_TIME=${{ steps.stamps.outputs.build_time }}
            BUILD_COMMIT=${{ steps.stamps.outputs.build_commit }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
